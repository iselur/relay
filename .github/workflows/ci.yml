name: CI

on:
  pull_request:
  push:
    branches: [main, ready-for-main]

# Least privilege: CI reads code and reports a status. It never needs write access.
permissions:
  contents: read

# The job key AND its name must both be exactly `ci`: the branch ruleset on
# `main` and `ready-for-main` requires a status check with the context `ci`, and
# GitHub Actions derives that context from the job name. Renaming this job, or
# adding a matrix to it (which would produce contexts like `ci (ubuntu-latest)`),
# will make every PR block forever.
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false   # the checkout token must not linger in .git/config

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      # CI used to run WITHOUT these deps, so every dispatcher/scope/attestation test SKIPPED and
      # the suite still exited 0 — a green check mark on a suite that asserted nothing. That is how
      # the SPEC-015 false PASS survived. Install the pinned deps so the trust tests actually run...
      - name: Install pinned dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --disable-pip-version-check -r scripts/requirements.txt

      # ...and run STRICT: if any test still skips, CI goes RED instead of quietly green. The ONLY
      # tolerated skips are the explicitly declared box-only tests below (they need the codex-worker
      # user + systemd, which do not exist on a hosted runner). Declared and visible beats silently
      # green: adding a test to this list is a reviewed decision, not a runner accident.
      - name: Run tests (strict — a skip is a failure unless declared box-only)
        env:
          ORCH_TEST_STRICT: '1'
          ORCH_TEST_STRICT_ALLOW_SKIP: 'tests/worker_isolation.sh tests/worker_userns.sh'
        run: ./scripts/test

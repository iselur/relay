id: SPEC-016
title: Add one-command Codex planning wrapper
risk_class: low
objective: >-
  Implement scripts/codex-plan as a low-friction wrapper that turns a task
  statement and optional context into a durable, provenance-preserving,
  Codex-drafted plan.
in_scope:
  - scripts/codex-plan
  - tests/codex_plan.sh
out_of_scope:
  - scripts/dispatch.py
  - Changes to dispatcher behavior or trust closures
  - Calling the real Codex service from tests or CI
needs_network: false
acceptance_criteria:
  - >-
    scripts/codex-plan exists, is executable, and accepts a task statement
    either as a command-line argument or from standard input.
  - >-
    scripts/codex-plan supports --small, repeatable --context <file>, and
    --out <dir> options; --out defaults to .orchestrator/plans/.
  - >-
    Each --context file's contents are appended to the prompt supplied to
    Codex, in the same order the options were provided.
  - >-
    The wrapper scans the selected output directory for existing PLAN-NNN
    artifacts, allocates the next numeric identifier, and increments beyond
    the highest existing identifier.
  - >-
    On success, the wrapper writes PLAN-NNN.md with valid YAML frontmatter
    containing id, a UTC created timestamp, the author model, status set to
    draft, and task set to the first 200 characters of the submitted task.
  - >-
    The content after the frontmatter is the complete non-empty plan output
    produced by Codex, and the wrapper prints both the resulting plan path and
    allocated PLAN-NNN identifier.
  - >-
    The wrapper invokes codex exec with exactly the required execution
    settings: -m gpt-5.6-sol, -c model_reasoning_effort=high,
    -c service_tier=priority, --sandbox read-only, and
    --skip-git-repo-check.
  - >-
    The Codex invocation is detached-safe: its standard input is redirected
    from /dev/null, the task and prompt are supplied without relying on
    interactive input, and the wrapper imposes no minute-scale or other
    wrapper-level timeout.
  - >-
    Raw Codex standard output and standard error are captured separately in
    provenance files beside the intended plan file on both success and
    failure.
  - >-
    The embedded default prompt requests a decision-complete plan covering
    the decision and non-goals, assumptions and evidence, alternatives,
    affected boundaries, failure modes, ordered implementation steps,
    validation criteria, and rollback.
  - >-
    When --small is supplied, the embedded prompt instead requests a
    five-field micro-plan containing objective, scope, action, verification,
    and rollback.
  - >-
    If Codex exits non-zero or produces empty output, scripts/codex-plan exits
    non-zero, creates no PLAN-NNN.md or partial plan file, and retains the raw
    stdout and stderr provenance files for diagnosis.
  - >-
    tests/codex_plan.sh replaces codex through PATH with a local stub and
    never invokes the real Codex binary or requires network access.
  - >-
    tests/codex_plan.sh verifies identifier allocation increments, generated
    frontmatter is well-formed and contains the required fields, --small
    changes the prompt, repeatable --context file contents appear in the
    prompt passed to the stub, and a non-zero or empty Codex result exits
    non-zero without creating a plan file.
  - >-
    bash tests/codex_plan.sh passes in CI without Codex credentials, a Codex
    installation, or network access.
  - >-
    The implementation changes only scripts/codex-plan and
    tests/codex_plan.sh and does not modify scripts/dispatch.py.
test_command: bash tests/codex_plan.sh

id: SPEC-007
title: Add an uppercase shell helper
risk_class: low
depends_on: []
objective: >
  A reusable Bash function upper exists at scripts/lib/upper.sh that prints its first argument
  with all ASCII letters converted to uppercase. Used to exercise Gate 3 part 3 (MAX_PARALLEL=2):
  it is independent of SPEC-008 so the two can run truly in parallel.
in_scope:
  - scripts/lib/**
  - tests/upper.sh
out_of_scope:
  - .github/**
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "scripts/lib/upper.sh defines a function upper that prints its first argument with ASCII a-z mapped to A-Z."
  - "upper 'abc' prints 'ABC'."
  - "upper 'AbC1' prints 'ABC1' (non-letters unchanged)."
  - "upper '' prints an empty string."
  - "tests/upper.sh sources the helper and asserts those cases; it exits 0 when all assertions pass."
test_command: "bash tests/upper.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/slugify.sh

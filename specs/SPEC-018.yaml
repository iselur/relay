id: SPEC-018
title: Squeeze helper also collapses tabs
risk_class: low
depends_on: []
objective: >
  The squeeze function in scripts/lib/squeeze.sh collapses each run of consecutive ASCII spaces
  and/or tabs in its first argument to a single space. R73 falsifier E2E fixture (successor to
  SPEC-012, whose objective is already satisfied on the base branch).
in_scope:
  - scripts/lib/**
  - tests/squeeze.sh
out_of_scope:
  - .github/**
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "squeeze collapses each run of ASCII spaces and/or tabs to a single space."
  - "squeeze on the bash string $'a\\t\\tb   c' prints 'a b c'."
  - "squeeze on the bash string $'a \\t b' prints 'a b'."
  - "squeeze '' prints an empty string."
  - "Space-only behavior is unchanged: squeeze 'a   b  c' prints 'a b c'."
  - >-
    tests/squeeze.sh sources the helper, asserts all of the above including at least one
    tab-containing case written with bash $'...' quoting, and exits 0 when all pass.
test_command: bash tests/squeeze.sh
regression_command: bash tests/squeeze.sh
regression_test_paths:
  - tests/squeeze.sh
hard_ceiling_hours: 2
needs_network: false
context:
  - scripts/lib/squeeze.sh
  - tests/squeeze.sh

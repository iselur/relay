id: SPEC-001
title: Add a slugify shell helper
risk_class: low
depends_on: []
objective: >
  A reusable Bash function slugify exists at scripts/lib/slugify.sh that turns an
  arbitrary string into a URL-safe slug, with a test that pins its behaviour. This
  is the Gate 1 end-to-end spike: its purpose is to exercise the Claude->Codex
  pipeline, not to build product.
in_scope:
  - scripts/lib/**
  - tests/slugify.sh
out_of_scope:
  - .github/**
  - scripts/test
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "scripts/lib/slugify.sh defines a function slugify that reads its first argument and prints the slug to stdout."
  - "Behaviour: lowercase; each run of non-alphanumeric characters becomes a single '-'; leading and trailing '-' are trimmed."
  - "tests/slugify.sh sources the helper and asserts: 'Hello, World!' -> 'hello-world'; '  a__b ' -> 'a-b'; '' -> ''."
  - "tests/slugify.sh exits 0 when all assertions pass."
test_command: "bash tests/slugify.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/smoke.sh

id: SPEC-008
title: Add a lowercase shell helper
risk_class: low
depends_on: []
objective: >
  A reusable Bash function lower exists at scripts/lib/lower.sh that prints its first argument
  with all ASCII letters converted to lowercase. Used to exercise Gate 3 part 3 (MAX_PARALLEL=2):
  it is independent of SPEC-007 so the two can run truly in parallel.
in_scope:
  - scripts/lib/**
  - tests/lower.sh
out_of_scope:
  - .github/**
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "scripts/lib/lower.sh defines a function lower that prints its first argument with ASCII A-Z mapped to a-z."
  - "lower 'ABC' prints 'abc'."
  - "lower 'AbC1' prints 'abc1' (non-letters unchanged)."
  - "lower '' prints an empty string."
  - "tests/lower.sh sources the helper and asserts those cases; it exits 0 when all assertions pass."
test_command: "bash tests/lower.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/slugify.sh

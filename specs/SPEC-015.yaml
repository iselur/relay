id: SPEC-015
title: Reviewer verdict v3 — advisory quality dimensions (gate stays binary)
risk_class: high
depends_on: []
objective: >
  Extend the reviewer rubric with graded QUALITY dimensions while keeping the merge gate strictly
  binary and fail-closed (ADOPT-fusion improvement #2, second half). The reviewer must score
  maintainability, design_fit, and test_quality (integers 1-5 with behavioral anchors, each with
  cited evidence) in every v3 verdict; the dispatcher aggregates them via `dispatch metrics`;
  score VALUES never influence any gate/merge/remediation decision — they are an operator trend
  signal only. Structural fail-closed note (SOL design review): the PRESENCE and schema-validity of
  the quality block IS gated (a v3 verdict missing or malforming it is rejected fail-closed, like
  any other schema violation); only the score values are advisory. Residual accepted risk (SOL):
  verdict and scores come from ONE reviewer invocation, so anchoring/halo coupling is possible;
  splitting into a second scoring pass is deferred (doubles reviewer quota) and this coupling must
  be documented in the reviewer-prompt code comment.
in_scope:
  - scripts/verdict.schema.json
  - scripts/dispatch.py
  - tests/dispatch_gate4.sh
out_of_scope:
  - scripts/lib/**
  - scripts/test
  - .orchestrator/**
  - .github/**
  - specs/**
  - CLAUDE.md
acceptance_criteria:
  - "scripts/verdict.schema.json becomes schema_version const '3': adds a required 'quality' object (additionalProperties false) with exactly the required members maintainability, design_fit, test_quality; each member is an object with additionalProperties false requiring an integer score with minimum 1 and maximum 5 (rejecting strings, null, booleans, and non-integral numbers by type) and an evidence string that must contain at least one non-whitespace character (pattern), not merely minLength 1. All v2 required fields, enums, and constraints are preserved verbatim."
  - "A regression matrix in tests proves no v2 constraint was weakened: representative previously-invalid verdicts (PASS with empty reasons; PASS with an UNMET criterion; missing scope/regression/security findings; criterion missing evidence) remain REJECTED when augmented with a fully valid quality block; and schema-version confusion is rejected both ways (a schema_version '2' verdict is rejected by the v3 validation; a v3 verdict missing the quality block is rejected as MALFORMED — never silently accepted as historical)."
  - "The reviewer prompt in scripts/dispatch.py requests schema_version 3, defines a behavioral anchor for each score level 1-5 of each dimension with non-overlapping definitions of maintainability vs design_fit, requires evidence to cite a concrete diff/test/path reference, and states explicitly that the PASS/FAIL verdict must be decided ONLY by the binary rubric (criteria/scope/regression/security) with score values having no influence; a code comment documents the accepted single-invocation anchoring residual."
  - "The dispatcher's binary-gate evaluation is isolated in a code path whose inputs exclude the quality block entirely, and no dispatcher code path uses quality score values for merge eligibility, gating, remediation, prioritization, or exit status. A differential test proves it: two otherwise-identical valid v3 PASS verdicts, one all-scores-1 and one all-scores-5, produce identical validation outcomes and identical gate results (and the same for a pair of FAIL verdicts)."
  - "cmd_metrics reports, for attempts whose review.json has schema_version '3' AND a fully schema-valid quality block only: quality_score_distribution per dimension (counts per score 1-5), quality_avg_by_dimension (mean, one decimal), and quality_scored_attempts (count of ATTEMPTS where all three dimensions are valid — never per-dimension counting). It also reports quality_skipped (count of review files skipped as v2-historical or malformed). v2 files — including a poisoned v2 file that contains a stray quality key — are never counted; corrupt JSON, partial quality blocks, wrong types, and out-of-range values are skipped gracefully with no crash and no partial counting. Output labels the whole quality section advisory."
  - "Version pinning (cutover invariant): cmd_launch snapshots the CURRENT scripts/verdict.schema.json into the attempt's evidence directory (e.g. <attempt>/verdict.schema.json) at launch time, and verdict validation for that attempt uses the pinned snapshot when present (falling back to the repo schema only when absent, for pre-pinning historical attempts). This makes each attempt's prompt+schema pair atomic per-attempt: an in-flight attempt launched before a schema upgrade is never validated against a newer schema. A test proves it: an attempt pinned with the v2 schema validates a v2 verdict successfully even when the repo schema file is v3."
  - "tests/dispatch_gate4.sh gains coverage for all of the above (schema boundary cases including score 0/6/string/null/non-integral/extra properties/whitespace-only evidence; the regression matrix; the differential score-invariance pairs; the version-pinning cutover case; metrics over a mix of v3 PASS, v3 FAIL, multiple attempts, malformed v3, corrupt JSON, and a poisoned v2 file), and the FULL repo suite (scripts/test) exits 0."
test_command: "./scripts/test"
hard_ceiling_hours: 2
needs_network: false
context:
  - scripts/verdict.schema.json
  - tests/dispatch_gate4.sh

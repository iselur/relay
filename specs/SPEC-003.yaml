id: SPEC-003
title: Add a repeat shell helper
risk_class: low
depends_on: []
objective: >
  A reusable Bash function repeat exists at scripts/lib/repeat.sh that prints its first
  argument concatenated N times, where N is the second argument. Second good dispatcher spec.
in_scope:
  - scripts/lib/**
  - tests/repeat.sh
out_of_scope:
  - .github/**
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "scripts/lib/repeat.sh defines a function repeat that prints its first argument repeated the number of times given by its second argument, with no separator and no trailing newline beyond one final newline."
  - "repeat 'ab' 3 prints 'ababab'."
  - "repeat 'x' 0 prints an empty string."
  - "tests/repeat.sh sources the helper and asserts those two cases plus repeat 'z' 1 -> 'z'."
  - "tests/repeat.sh exits 0 when all assertions pass."
test_command: "bash tests/repeat.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/slugify.sh
